name = "biztrack-api"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

# Production secrets (set via: wrangler secret put SECRET_NAME)
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY
# OPENROUTER_API_KEY

[env.production]
name = "biztrack-api"
vars = { ENVIRONMENT = "production" }
